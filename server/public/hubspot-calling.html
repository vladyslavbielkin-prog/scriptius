<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Scriptius — HubSpot Calling</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #f5f8fa; color: #33475b; }
    .status { font-size: 13px; color: #7c98b6; margin-bottom: 12px; }
    .status.ready { color: #00a4bd; }
    .status.error { color: #f2545b; }
    .client-info { background: #fff; border: 1px solid #cbd6e2; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .client-info h3 { font-size: 14px; margin-bottom: 8px; }
    .field { font-size: 12px; color: #516f90; margin-bottom: 4px; }
    .field strong { color: #33475b; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .btn-primary { background: #ff7a59; color: #fff; }
    .btn-primary:hover { background: #ff5c35; }
    .btn-secondary { background: #eaf0f6; color: #33475b; }
    .btn-secondary:hover { background: #dbe4ed; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="statusEl" class="status">Connecting to HubSpot...</div>

<div id="clientInfo" class="client-info hidden">
  <h3>Client</h3>
  <div id="fieldName" class="field"></div>
  <div id="fieldPhone" class="field"></div>
  <div id="fieldCompany" class="field"></div>
  <div id="fieldRole" class="field"></div>
</div>

<button id="btnCall" class="btn btn-primary" disabled>Start Call in Scriptius</button>
<button id="btnEnd" class="btn btn-secondary hidden">End Call</button>

<script>
  // ── Config ──
  const SCRIPTIUS_SERVER = window.location.origin;

  // ── State ──
  let callingExtensions = null;
  let currentCallData = null;
  let callEngagementId = null;

  const statusEl = document.getElementById('statusEl');
  const clientInfo = document.getElementById('clientInfo');
  const btnCall = document.getElementById('btnCall');
  const btnEnd = document.getElementById('btnEnd');

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + (cls || '');
  }

  function showClient(data) {
    clientInfo.classList.remove('hidden');
    document.getElementById('fieldName').innerHTML = data.name ? `<strong>${data.name}</strong>` : '';
    document.getElementById('fieldPhone').innerHTML = data.phone ? `Phone: ${data.phone}` : '';
    document.getElementById('fieldCompany').innerHTML = data.company ? `Company: ${data.company}` : '';
    document.getElementById('fieldRole').innerHTML = data.role ? `Role: ${data.role}` : '';
  }

  // ── Send prefill to Scriptius server ──
  async function sendPrefill(data) {
    try {
      const resp = await fetch(`${SCRIPTIUS_SERVER}/api/hubspot/webhook`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await resp.json();
      console.log('[Scriptius] Prefill sent:', result);
      return true;
    } catch (e) {
      console.error('[Scriptius] Prefill error:', e);
      return false;
    }
  }

  // ── HubSpot Calling Extensions SDK ──
  // Load SDK from HubSpot CDN
  const script = document.createElement('script');
  script.src = 'https://js.hubspot.com/calling-extensions-sdk/v0/calling-extensions-sdk.min.js';
  script.onload = () => initSDK();
  script.onerror = () => setStatus('Failed to load HubSpot SDK', 'error');
  document.head.appendChild(script);

  function initSDK() {
    if (!window.CallingExtensions) {
      setStatus('HubSpot SDK not available', 'error');
      return;
    }

    callingExtensions = new window.CallingExtensions({
      debugMode: false,
      eventHandlers: {
        onReady: (payload) => {
          console.log('[HubSpot] onReady', payload);
          setStatus('Ready — click a phone number in HubSpot', 'ready');
          callingExtensions.initialized({
            isLoggedIn: true,
            sizeInfo: { width: 320, height: 400 },
          });
        },

        onDialNumber: (data) => {
          console.log('[HubSpot] onDialNumber', data);
          currentCallData = data;

          const phoneNumber = data.phoneNumber || '';
          const contactName = data.toNumber || data.contactName || '';
          const objectId = data.objectId || '';
          const objectType = data.objectType || '';

          // Build prefill from available data
          const prefill = { phone: phoneNumber };

          // HubSpot sends callee info
          if (data.firstName) prefill.firstname = data.firstName;
          if (data.lastName) prefill.lastname = data.lastName;
          if (data.email) prefill.email = data.email;
          if (data.contactProperties) {
            const cp = data.contactProperties;
            if (cp.firstname) prefill.firstname = cp.firstname;
            if (cp.lastname) prefill.lastname = cp.lastname;
            if (cp.jobtitle) prefill.jobtitle = cp.jobtitle;
            if (cp.company) prefill.company = cp.company;
            if (cp.industry) prefill.industry = cp.industry;
          }

          showClient({
            name: [prefill.firstname, prefill.lastname].filter(Boolean).join(' ') || contactName,
            phone: phoneNumber,
            company: prefill.company || '',
            role: prefill.jobtitle || '',
          });

          // Send to Scriptius
          sendPrefill(prefill).then(ok => {
            if (ok) {
              setStatus('Data sent to Scriptius — start your call', 'ready');
              btnCall.disabled = false;
            } else {
              setStatus('Failed to send data to Scriptius', 'error');
            }
          });
        },

        onEndCall: () => {
          console.log('[HubSpot] onEndCall');
          setStatus('Call ended', '');
          btnCall.disabled = true;
          btnEnd.classList.add('hidden');
          btnCall.classList.remove('hidden');
        },

        onVisibilityChanged: (data) => {
          console.log('[HubSpot] visibility', data);
        },
      },
    });

    // ── Button handlers ──
    btnCall.addEventListener('click', () => {
      if (!callingExtensions) return;

      // Tell HubSpot the call started
      callingExtensions.outgoingCall({
        phoneNumber: currentCallData?.phoneNumber || '',
        callStartTime: Date.now(),
      });

      setStatus('Call in progress — switch to Scriptius tab', 'ready');
      btnCall.classList.add('hidden');
      btnEnd.classList.remove('hidden');

      // Open Scriptius in a new tab
      window.open(SCRIPTIUS_SERVER, '_blank');
    });

    btnEnd.addEventListener('click', () => {
      if (!callingExtensions) return;

      callingExtensions.callEnded({
        callEndStatus: 'COMPLETED',
      });

      setStatus('Call ended', '');
      btnEnd.classList.add('hidden');
      btnCall.classList.remove('hidden');
      btnCall.disabled = true;
    });
  }
</script>
</body>
</html>
